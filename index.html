.btn{padding:12px 20px;margin:10px;background:#27ae60;color:white;text-decoration:none;border-radius:25px;display:inline-block;}

footer{text-align:center;background:#2c3e50;color:white;padding:20px;margin-top:30px;}

.sticky-call {

<script>
let slides=document.querySelectorAll('.slide');
let index=0;
setInterval(()=>{
slides[index].classList.remove('active');
index=(index+1)%slides.length;
slides[index].classList.add('active');
},3000);

function sendWhatsApp(e){
e.preventDefault();
let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let msg=document.getElementById('message').value;
let text=`Name: ${name}%0APhone: ${phone}%0AMessage: ${msg}`;
window.open(`https://wa.me/919790891558?text=${text}`);
}
